<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云盘 · Cloud Drive</title>
  <meta name="description" content="基于 EdgeOne Pages Blob 的简易云盘" />
  <script>
    // Prevent auth view flash on refresh: if a token exists, hide everything
    // until JS finishes verification and decides which view to show.
    (function () {
      if (localStorage.getItem('cd_token')) {
        document.documentElement.classList.add('app-loading');
      }
    })();
  </script>
  <style>
    /* While loading with a stored token, hide auth view to avoid flash */
    html.app-loading body { visibility: hidden; }
    html.app-loading #authView { display: none !important; }
  </style>
  <style id="mainStyles">
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f0f2f5;
      --bg-gradient: radial-gradient(1200px 600px at 10% -10%, #dbeafe 0%, transparent 50%),
                     radial-gradient(1000px 500px at 110% 10%, #ede9fe 0%, transparent 50%),
                     radial-gradient(800px 400px at 50% 110%, #fce7f3 0%, transparent 50%),
                     #f0f2f5;
      --surface: #ffffff;
      --surface-glass: rgba(255, 255, 255, 0.72);
      --surface-glass-strong: rgba(255, 255, 255, 0.85);
      --ink: #1e293b;
      --body: #475569;
      --mute: #94a3b8;
      --border: rgba(226, 232, 240, 0.8);
      --border-strong: #cbd5e1;
      --border-glass: rgba(255, 255, 255, 0.5);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-soft: #eef2ff;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --accent: #8b5cf6;
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --danger-hover: #dc2626;
      --success: #10b981;
      --warning: #f59e0b;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-lg: 20px;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.08), 0 2px 4px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.15), 0 8px 16px rgba(15, 23, 42, 0.08);
      --shadow-glow: 0 8px 32px rgba(99, 102, 241, 0.2);
      --glass-blur: blur(20px) saturate(180%);
      --glass-blur-light: blur(12px) saturate(150%);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input { font-family: inherit; }
    a { color: var(--primary); text-decoration: none; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); background-clip: padding-box; }

    /* ── Auth View ── */
    .auth-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: radial-gradient(1200px 600px at 10% 10%, #c7d2fe 0%, transparent 50%),
                  radial-gradient(1000px 500px at 90% 90%, #ddd6fe 0%, transparent 50%),
                  radial-gradient(900px 400px at 50% 50%, #fbcfe8 0%, transparent 60%),
                  linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
    }
    .auth-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.15) 0%, transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 40%);
      pointer-events: none;
    }
    .auth-card {
      background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.6);
      width: 100%; max-width: 420px;
      padding: 44px 36px;
      position: relative;
      z-index: 1;
      animation: cardFloat 0.6s var(--transition-bounce);
    }
    @keyframes cardFloat { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .auth-logo {
      text-align: center; margin-bottom: 28px;
    }
    .auth-logo svg { width: 52px; height: 52px; filter: drop-shadow(0 4px 12px var(--primary-glow)); }
    .auth-title {
      font-size: 24px; font-weight: 700; text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .auth-subtitle {
      font-size: 14px; color: var(--body); text-align: center;
      margin-bottom: 28px;
    }
    .auth-tabs {
      display: flex; gap: 4px; background: rgba(241, 245, 249, 0.7);
      backdrop-filter: var(--glass-blur-light);
      border-radius: var(--radius-sm); padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1; padding: 10px; border-radius: 6px;
      font-size: 14px; font-weight: 500; color: var(--body);
      transition: all var(--transition);
    }
    .auth-tab:hover { color: var(--ink); }
    .auth-tab.active {
      background: var(--surface); color: var(--primary);
      box-shadow: var(--shadow-md);
    }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-form.hide { display: none; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; font-weight: 500; color: var(--body); }
    .form-input {
      padding: 12px 14px; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); font-size: 14px;
      background: rgba(255,255,255,0.6);
      transition: all var(--transition);
      outline: none;
    }
    .form-input:hover { border-color: var(--primary); }
    .form-input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }
    .btn {
      padding: 11px 18px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500;
      transition: all var(--transition);
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 4px 14px var(--primary-glow);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--primary-glow);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    /* Shine effect on primary buttons */
    .btn-primary::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s;
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-ghost {
      background: var(--surface-glass);
      backdrop-filter: var(--glass-blur-light);
      color: var(--body);
      border: 1px solid var(--border-strong);
    }
    .btn-ghost:hover {
      background: var(--surface);
      color: var(--ink);
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--danger) 0%, var(--danger-hover) 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
    }
    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
    }
    .btn-block { width: 100%; }
    .auth-error {
      background: var(--danger-soft); color: var(--danger);
      padding: 10px 12px; border-radius: var(--radius-sm);
      font-size: 13px; display: none;
      border: 1px solid rgba(239, 68, 68, 0.2);
      animation: shake 0.4s;
    }
    .auth-error.show { display: block; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .auth-hint {
      font-size: 12px; color: var(--mute); text-align: center;
      margin-top: 16px; line-height: 1.6;
    }

    /* ── Drive View ── */
    .drive { display: none; min-height: 100vh; flex-direction: column; }
    .drive.show { display: flex; }

    /* Nav */
    .nav {
      background: var(--surface-glass);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border-glass);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; gap: 20px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 12px rgba(15, 23, 42, 0.04);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-brand svg { width: 28px; height: 28px; filter: drop-shadow(0 2px 8px var(--primary-glow)); -webkit-text-fill-color: initial; }
    .nav-spacer { flex: 1; }
    .nav-storage {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--body);
    }
    .storage-bar {
      width: 140px; height: 8px; background: rgba(148, 163, 184, 0.2);
      border-radius: 4px; overflow: hidden;
      backdrop-filter: var(--glass-blur-light);
    }
    .storage-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      border-radius: 4px; transition: width 0.4s var(--transition);
      box-shadow: 0 0 12px var(--primary-glow);
    }
    .storage-fill.warn { background: linear-gradient(90deg, var(--warning) 0%, #fbbf24 100%); box-shadow: 0 0 12px rgba(245, 158, 11, 0.4); }
    .storage-fill.danger { background: linear-gradient(90deg, var(--danger) 0%, #f87171 100%); box-shadow: 0 0 12px rgba(239, 68, 68, 0.4); }
    .nav-user {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 500;
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; text-transform: uppercase;
      box-shadow: 0 2px 8px var(--primary-glow);
    }
    .btn-icon {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--body); transition: all var(--transition);
    }
    .btn-icon:hover {
      background: var(--surface-glass-strong);
      color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .btn-icon:active { transform: translateY(0); }
    .btn-icon svg { width: 20px; height: 20px; }

    /* Main */
    .main {
      flex: 1; max-width: 1100px; width: 100%;
      margin: 0 auto; padding: 24px;
    }

    /* Breadcrumbs */
    .breadcrumbs {
      display: flex; align-items: center; gap: 4px;
      font-size: 14px; margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .crumb {
      padding: 6px 10px; border-radius: var(--radius-sm);
      color: var(--body); cursor: pointer;
      transition: all var(--transition);
    }
    .crumb:hover { background: var(--surface-glass-strong); color: var(--primary); }
    .crumb.current { color: var(--ink); font-weight: 600; cursor: default; }
    .crumb.current:hover { background: none; }
    .crumb-sep { color: var(--mute); user-select: none; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .toolbar-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .btn-sm { padding: 7px 12px; font-size: 13px; gap: 4px; }
    .btn-sm svg { width: 16px; height: 16px; }
    .btn-icon.btn-sm { width: 32px; height: 32px; padding: 0; }
    .batch-bar {
      display: none; align-items: center; gap: 8px;
      width: 100%; padding: 12px 14px;
      background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur-light);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      animation: fadeInUp 0.25s ease;
      flex-wrap: wrap;
    }
    .batch-bar.show { display: flex; }
    .batch-count {
      font-size: 13px; font-weight: 600; color: var(--primary);
      margin-right: auto;
    }
    .select-mode #fileContainer { user-select: none; }
    .file-check {
      display: none; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--border-strong);
      background: var(--surface);
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .select-mode .file-check { display: flex; }
    .file-check.checked {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border-color: var(--primary);
      color: #fff;
    }
    .file-check.checked svg { display: block; }
    .file-check svg { display: none; width: 14px; height: 14px; }
    .file-card.selected, .list-row.selected {
      background: var(--primary-soft) !important;
      border-color: var(--primary) !important;
    }
    .btn.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: var(--primary);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .btn:disabled::before { display: none; }
    .search-box {
      position: relative;
    }
    .search-input {
      padding: 9px 14px 9px 36px; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); font-size: 13px;
      width: 220px; outline: none;
      background: var(--surface-glass);
      backdrop-filter: var(--glass-blur-light);
      transition: all var(--transition);
    }
    .search-input:hover { border-color: var(--primary); }
    .search-input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 4px var(--primary-glow);
      width: 260px;
    }
    .search-box svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--mute);
      transition: color var(--transition);
    }
    .search-input:focus + svg, .search-box:hover svg { color: var(--primary); }

    /* File list */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }
    .file-card {
      background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur-light);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius); padding: 18px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: fadeInUp 0.3s ease backwards;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .file-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
      transform: translateY(-4px);
    }
    .file-card:active { transform: translateY(-2px); }
    .file-card .file-icon { width: 48px; height: 48px; transition: transform var(--transition); }
    .file-card:hover .file-icon { transform: scale(1.1); }
    .file-card .file-name {
      font-size: 13px; font-weight: 500; text-align: center;
      word-break: break-all; line-height: 1.4;
      max-width: 100%;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .file-card .file-meta {
      font-size: 11px; color: var(--mute);
    }
    .file-card .file-actions {
      position: absolute; top: 8px; right: 8px;
      display: none; gap: 4px; flex-wrap: wrap;
      justify-content: flex-end; max-width: 60%;
    }
    .file-card:hover .file-actions { display: flex; }
    .file-card .file-check {
      position: absolute; top: 8px; left: 8px;
      z-index: 2;
    }
    .select-mode .file-card .file-actions { display: none; }
    .select-mode .file-card:hover { transform: none; }
    .select-mode .list-row .list-actions { display: none; }
    .file-action-btn {
      width: 30px; height: 30px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--body); background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur-light);
      border: 1px solid var(--border-glass);
      transition: all var(--transition);
    }
    .file-action-btn:hover { background: var(--surface); color: var(--primary); transform: scale(1.1); }
    .file-action-btn.danger:hover { background: var(--danger-soft); color: var(--danger); border-color: var(--danger); }
    .file-action-btn svg { width: 15px; height: 15px; }

    /* List view */
    .file-list-view {
      background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur-light);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow);
    }
    .list-header {
      display: grid; grid-template-columns: 1fr 120px 160px 80px;
      padding: 12px 16px; background: rgba(241, 245, 249, 0.6);
      font-size: 12px; font-weight: 600; color: var(--body);
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    .list-row {
      display: grid; grid-template-columns: 1fr 120px 160px 80px;
      padding: 12px 16px; align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
      position: relative;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row:hover { background: var(--primary-soft); }
    .list-row .list-name {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 500;
    }
    .list-row .list-icon { width: 24px; height: 24px; flex-shrink: 0; transition: transform var(--transition); }
    .list-row:hover .list-icon { transform: scale(1.15); }
    .list-row .list-size, .list-row .list-date {
      font-size: 13px; color: var(--body);
    }
    .list-row .list-actions {
      display: flex; gap: 4px; opacity: 0;
      transition: opacity var(--transition);
    }
    .list-row:hover .list-actions { opacity: 1; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--mute);
    }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--body); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; }

    /* Loading */
    .loading {
      text-align: center; padding: 40px; color: var(--mute);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Drop overlay */
    .drop-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .drop-overlay.show { display: flex; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .drop-box {
      border: 3px dashed var(--primary);
      border-radius: var(--radius-lg);
      padding: 56px 72px;
      background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur);
      text-align: center;
      color: var(--primary);
      box-shadow: var(--shadow-lg);
      animation: bounce 0.5s var(--transition-bounce);
    }
    @keyframes bounce { from { transform: scale(0.9); } to { transform: scale(1); } }
    .drop-box svg { width: 56px; height: 56px; margin-bottom: 14px; }
    .drop-box p { font-size: 20px; font-weight: 600; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.show { display: flex; animation: fadeIn 0.2s; }
    .modal {
      background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%; max-width: 460px;
      max-height: 90vh; overflow: hidden;
      display: flex; flex-direction: column;
      animation: modalIn 0.3s var(--transition-bounce);
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; overflow-y: auto; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .modal-close {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--mute);
      transition: all var(--transition);
    }
    .modal-close:hover { background: var(--bg); color: var(--ink); transform: rotate(90deg); }

    /* Move modal */
    .move-breadcrumbs {
      display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--surface-glass);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      font-size: 13px;
    }
    .move-crumb {
      padding: 4px 8px; border-radius: 6px; cursor: pointer;
      color: var(--body); transition: all var(--transition);
    }
    .move-crumb:hover { background: var(--primary-soft); color: var(--primary); }
    .move-crumb-sep { color: var(--mute); user-select: none; }
    .move-folder-list {
      max-height: 280px; overflow-y: auto;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px;
      background: rgba(255, 255, 255, 0.4);
    }
    .move-folder-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--ink);
      transition: all var(--transition);
    }
    .move-folder-item:hover { background: var(--primary-soft); color: var(--primary); transform: translateX(4px); }
    .move-folder-item.disabled { opacity: 0.4; cursor: not-allowed; }
    .move-folder-item.disabled:hover { background: none; color: var(--ink); transform: none; }
    .move-folder-item .move-chevron { margin-left: auto; color: var(--mute); transition: transform var(--transition); }
    .move-folder-item:hover .move-chevron { transform: translateX(4px); color: var(--primary); }
    .move-folder-item .move-hint { margin-left: auto; font-size: 12px; color: var(--mute); }
    .move-empty { padding: 24px; text-align: center; color: var(--mute); font-size: 13px; }

    /* Info modal */
    .info-rows { display: flex; flex-direction: column; gap: 2px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 13px; gap: 16px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--mute); white-space: nowrap; }
    .info-val { color: var(--ink); text-align: right; word-break: break-all; }
    .info-id {
      font-family: var(--font-mono); font-size: 11px;
      background: var(--surface-glass); padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border);
    }
    .info-preview-wrap {
      margin-bottom: 16px; border-radius: var(--radius-sm);
      overflow: hidden; background: var(--surface-glass);
      border: 1px solid var(--border); min-height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .info-preview-img { max-width: 100%; max-height: 240px; display: block; }
    .info-preview-loading { color: var(--mute); font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .info-preview-error { color: var(--mute); font-size: 13px; }

    /* Image preview */
    .preview-modal { max-width: 900px; }
    .preview-img {
      max-width: 100%; max-height: 70vh; display: block; margin: 0 auto;
      border-radius: var(--radius-sm);
    }
    .preview-name {
      text-align: center; padding: 12px; font-size: 14px; color: var(--body);
    }

    /* Upload progress */
    .upload-list { display: flex; flex-direction: column; gap: 12px; }
    .upload-item {
      display: flex; flex-direction: column; gap: 6px;
    }
    .upload-item-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px;
    }
    .upload-item-name { flex: 1; font-weight: 500; word-break: break-all; }
    .upload-item-size { color: var(--mute); font-size: 12px; }
    .upload-progress {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .upload-progress-fill {
      height: 100%; background: var(--primary); border-radius: 3px;
      transition: width 0.2s; width: 0%;
    }
    .upload-progress-fill.done { background: var(--success); }
    .upload-progress-fill.error { background: var(--danger); }
    .upload-status { font-size: 12px; color: var(--mute); }
    .upload-status.error { color: var(--danger); }
    .upload-status.success { color: var(--success); }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 400;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--surface-glass-strong);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      padding: 12px 16px; min-width: 260px; max-width: 400px;
      display: flex; align-items: center; gap: 10px;
      font-size: 14px;
      animation: toastIn 0.3s var(--transition-bounce);
      border-left: 4px solid var(--primary);
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warning { border-left-color: var(--warning); }
    .toast.hide { animation: toastOut 0.25s ease forwards; }
    @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

    /* ── Admin View ── */
    .admin-view { display: none; min-height: 100vh; flex-direction: column; }
    .admin-view.show { display: flex; }
    .admin-main { flex: 1; max-width: 1100px; width: 100%; margin: 0 auto; padding: 24px; }
    .admin-section { background: var(--surface-glass-strong); backdrop-filter: var(--glass-blur-light); border: 1px solid var(--border-glass); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .admin-section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 8px; }
    .stat-card { background: rgba(241, 245, 249, 0.6); border-radius: var(--radius); padding: 20px; transition: transform var(--transition); }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card .stat-label { font-size: 12px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-card .stat-value { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .admin-table th { text-align: left; padding: 10px 12px; background: rgba(241, 245, 249, 0.6); font-size: 12px; font-weight: 600; color: var(--body); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .admin-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--bg); }
    .admin-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; background: var(--primary-soft); color: var(--primary); }
    .admin-badge.admin { background: #fef3c7; color: #92400e; }
    .config-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .config-row label { width: 180px; font-size: 14px; font-weight: 500; color: var(--body); flex-shrink: 0; }
    .config-row input, .config-row select { flex: 1; padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; outline: none; }
    .config-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .config-hint { font-size: 12px; color: var(--mute); margin-left: 192px; margin-top: -8px; margin-bottom: 14px; }
    .nav-admin-btn { display: none; }
    .nav-admin-btn.show { display: inline-flex; }

    /* Responsive */
    @media (max-width: 640px) {
      .nav { padding: 0 12px; gap: 10px; }
      .nav-storage { display: none; }
      .main { padding: 16px 12px; }
      .file-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
      .search-input { width: 130px; }
      .list-header, .list-row { grid-template-columns: 1fr 80px 60px; }
      .list-header .col-date, .list-row .list-date { display: none; }
      .toolbar-right .search-box { display: none; }
    }
  </style>
</head>
<body>

  <!-- ═══ Auth View ═══ -->

  <!-- ═══ Drive View ═══ -->

    <nav class="nav">

              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>

  <script>
    // ═══ State ═══
    const API = '/api';
    let token = localStorage.getItem('cd_token');
    let user = null;
    try { user = JSON.parse(localStorage.getItem('cd_user') || 'null'); } catch {}
    let currentPath = '/';
    let items = [];
    let viewMode = localStorage.getItem('cd_view') || 'grid';
    let stats = { storageUsed: 0, quota: 500 * 1024 * 1024, fileCount: 0 };
    let searchQuery = '';
    let sortKey = 'name';
    let sortDir = 'asc';
    let selectMode = false;
    let selectedIds = new Set();

    // ═══ API helper ═══
    async function api(path, options = {}) {
      const headers = { ...options.headers };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      if (options.body && typeof options.body === 'string') {
        headers['Content-Type'] = 'application/json';
      }
      // For File/Blob bodies (direct upload), let the browser set the Content-Type
      const resp = await fetch(API + path, { ...options, headers });
      if (resp.status === 401) {
        handleLogout();
        throw new Error('登录已过期，请重新登录');
      }
      return resp;
    }

    // ═══ Auth ═══
    function switchAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('loginForm').classList.toggle('hide', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hide', tab !== 'register');
      hideAuthError();
    }

    function showAuthError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideAuthError() {
      document.getElementById('authError').classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideAuthError();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '登录中...';
      try {
        const resp = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();
        if (!resp.ok) { showAuthError(data.error || '登录失败'); return; }
        saveAuth(data.token, data.user);
        enterDrive();
      } catch (err) {
        showAuthError(err.message);
      } finally {
        btn.disabled = false; btn.textContent = '登录';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideAuthError();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;
      if (password !== password2) { showAuthError('两次输入的密码不一致'); return; }
      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = '注册中...';
      try {
        const resp = await api('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();
        if (!resp.ok) { showAuthError(data.error || '注册失败'); return; }
        saveAuth(data.token, data.user);
        enterDrive();
      } catch (err) {
        showAuthError(err.message);
      } finally {
        btn.disabled = false; btn.textContent = '注册';
      }
    }

    function saveAuth(t, u) {
      token = t;
      user = u;
      localStorage.setItem('cd_token', t);
      localStorage.setItem('cd_user', JSON.stringify(u));
    }

    function handleLogout() {
      token = null;
      user = null;
      localStorage.removeItem('cd_token');
      localStorage.removeItem('cd_user');
      document.getElementById('driveView').classList.remove('show');
      document.getElementById('adminView').classList.remove('show');
      document.getElementById('authView').style.display = 'flex';
    }

    async function checkAuth() {
      if (!token) return false;
      try {
        const resp = await api('/auth/me');
        if (!resp.ok) return false;
        const data = await resp.json();
        user = data.user;
        localStorage.setItem('cd_user', JSON.stringify(user));
        return true;
      } catch { return false; }
    }

    async function enterDrive() {
      document.getElementById('authView').style.display = 'none';
      document.getElementById('driveView').classList.add('show');
      document.getElementById('navUsername').textContent = user.username;
      document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
      // Show admin button if admin
      const adminBtn = document.getElementById('navAdminBtn');
      if (user.isAdmin) adminBtn.classList.add('show');
      else adminBtn.classList.remove('show');
      currentPath = '/';
      await loadFiles();
      await loadStats();
    }

    // ═══ Files ═══
    async function loadFiles() {
      const container = document.getElementById('fileContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
      try {
        const resp = await api('/files?path=' + encodeURIComponent(currentPath));
        if (!resp.ok) { container.innerHTML = '<div class="empty-state"><p>加载失败</p></div>'; return; }
        const data = await resp.json();
        items = data.items || [];
        renderFiles();
        renderBreadcrumbs();
      } catch (err) {
        container.innerHTML = '<div class="empty-state"><p>' + escapeHtml(err.message) + '</p></div>';
      }
    }

    async function loadStats() {
      try {
        const resp = await api('/user/stats');
        if (!resp.ok) return;
        stats = await resp.json();
        renderStats();
      } catch {}
    }

    function renderStats() {
      const used = stats.storageUsed || 0;
      const quota = stats.quota || 500 * 1024 * 1024;
      const pct = Math.min(100, (used / quota) * 100);
      const fill = document.getElementById('storageFill');
      fill.style.width = pct + '%';
      fill.className = 'storage-fill' + (pct > 90 ? ' danger' : pct > 75 ? ' warn' : '');
      document.getElementById('storageText').textContent = formatBytes(used) + ' / ' + formatBytes(quota);
    }

    function renderBreadcrumbs() {
      const el = document.getElementById('breadcrumbs');
      const parts = currentPath.split('/').filter(Boolean);
      let html = '<span class="crumb' + (parts.length === 0 ? ' current' : '') + '" data-path="/" onclick="breadcrumbClick(this)">全部文件</span>';
      let path = '';
      for (let i = 0; i < parts.length; i++) {
        path += '/' + parts[i];
        const isLast = i === parts.length - 1;
        html += '<span class="crumb-sep">/</span>';
        html += '<span class="crumb' + (isLast ? ' current' : '') + '" data-path="' + escapeAttr(path + '/') + '" onclick="breadcrumbClick(this)">' + escapeHtml(parts[i]) + '</span>';
      }
      el.innerHTML = html;
    }

    function breadcrumbClick(el) {
      navigateTo(el.dataset.path);
    }

    function renderFiles() {
      const container = document.getElementById('fileContainer');
      let filtered = items;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = items.filter(i => i.name.toLowerCase().includes(q));
      }

      // Sort: folders first, then by sortKey
      filtered = [...filtered].sort((a, b) => {
        if (a.isFolder && !b.isFolder) return -1;
        if (!a.isFolder && b.isFolder) return 1;
        let av, bv;
        if (sortKey === 'size') { av = a.size || 0; bv = b.size || 0; }
        else if (sortKey === 'date') { av = new Date(a.updatedAt || a.createdAt || 0).getTime(); bv = new Date(b.updatedAt || b.createdAt || 0).getTime(); }
        else { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <h3>${searchQuery ? '未找到匹配的文件' : '此文件夹为空'}</h3>
            <p>${searchQuery ? '尝试其他关键词' : '点击上方按钮上传文件或新建文件夹'}</p>
          </div>`;
        return;
      }

      if (viewMode === 'grid') {
        container.innerHTML = '<div class="file-grid">' + filtered.map(renderFileCard).join('') + '</div>';
      } else {
        const sortArrow = (k) => sortKey === k ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
        container.innerHTML = `
          <div class="file-list-view">
            <div class="list-header">
              <span style="cursor:pointer;" onclick="toggleSort('name')">名称${sortArrow('name')}</span>
              <span style="cursor:pointer;" onclick="toggleSort('size')">大小${sortArrow('size')}</span>
              <span class="col-date" style="cursor:pointer;" onclick="toggleSort('date')">修改时间${sortArrow('date')}</span>
              <span>操作</span>
            </div>
            ${filtered.map(renderFileRow).join('')}
          </div>`;
      }
    }

    function toggleSort(key) {
      if (sortKey === key) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortKey = key;
        sortDir = 'asc';
      }
      renderFiles();
    }

    // ═══ Batch selection ═══
    function toggleSelectMode() {
      selectMode = !selectMode;
      const drive = document.getElementById('driveView');
      const bar = document.getElementById('batchBar');
      const btn = document.getElementById('selectToggleBtn');
      if (selectMode) {
        drive.classList.add('select-mode');
        bar.classList.add('show');
        btn.classList.add('active');
      } else {
        drive.classList.remove('select-mode');
        bar.classList.remove('show');
        btn.classList.remove('active');
        selectedIds.clear();
      }
      updateBatchCount();
      renderFiles();
    }

    function exitSelectMode() {
      if (selectMode) toggleSelectMode();
    }

    function toggleSelect(id, event) {
      if (event) event.stopPropagation();
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      updateBatchCount();
      renderFiles();
    }

    function selectAll() {
      const filtered = getFilteredItems();
      if (selectedIds.size === filtered.length) {
        filtered.forEach(f => selectedIds.delete(f.id));
      } else {
        filtered.forEach(f => selectedIds.add(f.id));
      }
      updateBatchCount();
      renderFiles();
    }

    function clearSelection() {
      selectedIds.clear();
      updateBatchCount();
      renderFiles();
    }

    function updateBatchCount() {
      const count = selectedIds.size;
      document.getElementById('batchCount').textContent = '已选 ' + count + ' 项';
      const disabled = count === 0;
      document.getElementById('batchMoveBtn').disabled = disabled;
      document.getElementById('batchDeleteBtn').disabled = disabled;
    }

    function getFilteredItems() {
      let filtered = items;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = items.filter(i => i.name.toLowerCase().includes(q));
      }
      return filtered;
    }

    function showBatchDeleteModal() {
      if (selectedIds.size === 0) return;
      const count = selectedIds.size;
      showModal(`
        <div class="modal-header">
          <span class="modal-title">批量删除</span>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body"><p style="font-size:14px;line-height:1.6;">确认删除选中的 <strong style="color:var(--danger);">${count}</strong> 个文件/文件夹？<br><span style="color:var(--mute);font-size:13px;">文件夹及其所有内容将被一并删除，此操作不可撤销。</span></p></div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button class="btn btn-danger" onclick="confirmBatchDelete()">删除</button>
        </div>`);
    }

    async function confirmBatchDelete() {
      const ids = Array.from(selectedIds);
      let ok = 0, fail = 0;
      await Promise.all(ids.map(async (id) => {
        try {
          const file = items.find(f => f.id === id);
          const endpoint = file && file.isFolder ? '/folders/' + id : '/files/' + id;
          const resp = await api(endpoint, { method: 'DELETE' });
          if (resp.ok) ok++; else fail++;
        } catch { fail++; }
      }));
      closeModal();
      if (fail === 0) showToast('已删除 ' + ok + ' 项', 'success');
      else if (ok === 0) showToast('删除失败', 'error');
      else showToast('已删除 ' + ok + ' 项，' + fail + ' 项失败', 'warning');
      selectedIds.clear();
      exitSelectMode();
      await loadFiles();
      await loadStats();
    }

    function showBatchMoveModal() {
      if (selectedIds.size === 0) return;
      moveTargetId = null; // null signals batch mode
      moveCurrentPath = '/';
      loadBatchMoveFolders();
    }

    async function loadBatchMoveFolders() {
      try {
        const resp = await api('/files?path=' + encodeURIComponent(moveCurrentPath));
        if (!resp.ok) { showToast('加载文件夹失败', 'error'); return; }
        const data = await resp.json();
        moveFolders = (data.items || []).filter(f => f.isFolder);
        renderBatchMoveModal();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderBatchMoveModal() {
      const parts = moveCurrentPath.split('/').filter(Boolean);
      let crumbsHtml = '<span class="move-crumb" onclick="batchMoveNavigateTo(\'/\')">根目录</span>';
      let p = '';
      for (let i = 0; i < parts.length; i++) {
        p += '/' + parts[i];
        crumbsHtml += '<span class="move-crumb-sep">/</span>';
        crumbsHtml += '<span class="move-crumb" onclick="batchMoveNavigateTo(\'' + escapeAttr(p + '/') + '\')">' + escapeHtml(parts[i]) + '</span>';
      }
      let listHtml = '';
      if (moveFolders.length === 0) {
        listHtml = '<div class="move-empty">此处没有子文件夹</div>';
      } else {
        for (const f of moveFolders) {
          const fp = f.path + f.name + '/';
          listHtml += '<div class="move-folder-item" onclick="batchMoveNavigateTo(\'' + escapeAttr(fp) + '\')">'
            + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'
            + '<span>' + escapeHtml(f.name) + '</span>'
            + '<svg class="move-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>'
            + '</div>';
        }
      }
      const count = selectedIds.size;
      showModal(`
        <div class="modal-header">
          <span class="modal-title">批量移动 (${count} 项)</span>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="move-breadcrumbs">${crumbsHtml}</div>
          <div class="move-folder-list">${listHtml}</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="confirmBatchMove()">移动到此处</button>
        </div>`);
    }

    async function batchMoveNavigateTo(path) {
      moveCurrentPath = path;
      await loadBatchMoveFolders();
    }

    async function confirmBatchMove() {
      const ids = Array.from(selectedIds);
      let ok = 0, fail = 0;
      await Promise.all(ids.map(async (id) => {
        try {
          const resp = await api('/files/' + id, {
            method: 'PATCH',
            body: JSON.stringify({ path: moveCurrentPath }),
          });
          if (resp.ok) ok++; else fail++;
        } catch { fail++; }
      }));
      closeModal();
      if (fail === 0) showToast('已移动 ' + ok + ' 项', 'success');
      else if (ok === 0) showToast('移动失败', 'error');
      else showToast('已移动 ' + ok + ' 项，' + fail + ' 项失败', 'warning');
      selectedIds.clear();
      exitSelectMode();
      await loadFiles();
    }

    function renderFileCard(file) {
      const icon = getFileIcon(file);
      const meta = file.isFolder ? `${countFolderHint(file)}` : formatBytes(file.size);
      const checked = selectedIds.has(file.id);
      const handler = selectMode
        ? `toggleSelect('${file.id}', event)`
        : `onItemClick('${file.id}', ${file.isFolder})`;
      return `
        <div class="file-card${checked ? ' selected' : ''}" onclick="${handler}">
          <div class="file-check${checked ? ' checked' : ''}" onclick="event.stopPropagation();toggleSelect('${file.id}', event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="file-actions">
            ${fileActionButtons(file)}
          </div>
          ${icon}
          <div class="file-name" title="${escapeAttr(file.name)}">${escapeHtml(file.name)}</div>
          <div class="file-meta">${meta}</div>
        </div>`;
    }

    function renderFileRow(file) {
      const icon = getFileIcon(file, 24);
      const size = file.isFolder ? '—' : formatBytes(file.size);
      const date = formatDate(file.updatedAt || file.createdAt);
      const checked = selectedIds.has(file.id);
      const handler = selectMode
        ? `toggleSelect('${file.id}', event)`
        : `onItemClick('${file.id}', ${file.isFolder})`;
      return `
        <div class="list-row${checked ? ' selected' : ''}" onclick="${handler}">
          <div class="list-name">
            <div class="file-check${checked ? ' checked' : ''}" onclick="event.stopPropagation();toggleSelect('${file.id}', event)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            ${icon}<span title="${escapeAttr(file.name)}">${escapeHtml(file.name)}</span>
          </div>
          <div class="list-size">${size}</div>
          <div class="list-date col-date">${date}</div>
          <div class="list-actions" onclick="event.stopPropagation()">
            ${fileActionButtons(file, true)}
          </div>
        </div>`;
    }

    function fileActionButtons(file, small) {
      let btns = '';
      if (!file.isFolder) {
        btns += `<button class="file-action-btn" onclick="event.stopPropagation();downloadFile('${file.id}')" title="下载">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>`;
      }
      btns += `<button class="file-action-btn" onclick="event.stopPropagation();showMoveModal('${file.id}')" title="移动到">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 17 15 14"/></svg>
      </button>`;
      btns += `<button class="file-action-btn" onclick="event.stopPropagation();showRenameModal('${file.id}')" title="重命名">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>`;
      btns += `<button class="file-action-btn" onclick="event.stopPropagation();showInfoModal('${file.id}')" title="详情">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>`;
      btns += `<button class="file-action-btn danger" onclick="event.stopPropagation();showDeleteModal('${file.id}')" title="删除">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>`;
      return btns;
    }

    function countFolderHint(file) {
      return '文件夹';
    }

    function onItemClick(id, isFolder) {
      const file = items.find(f => f.id === id);
      if (!file) return;
      if (isFolder) {
        navigateTo(file.path + file.name + '/');
      } else {
        // Preview images, otherwise download
        if (isImageFile(file)) {
          previewImage(file);
        } else if (isTextFile(file)) {
          previewText(file);
        } else {
          downloadFile(id);
        }
      }
    }

    function navigateTo(path) {
      currentPath = path;
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      if (selectMode) exitSelectMode();
      loadFiles();
    }

    // ═══ Upload ═══
    function triggerUpload() {
      document.getElementById('fileInput').click();
    }

    function handleFileSelect(e) {
      const files = e.target.files;
      if (files && files.length > 0) {
        uploadFiles(Array.from(files));
      }
      e.target.value = '';
    }

    async function uploadFiles(files) {
      showUploadModal(files);
      for (let i = 0; i < files.length; i++) {
        await uploadSingleFile(files[i], i);
      }
      await loadFiles();
      await loadStats();
    }

    async function uploadSingleFile(file, index) {
      const item = document.getElementById('upload-item-' + index);
      const fill = item.querySelector('.upload-progress-fill');
      const status = item.querySelector('.upload-status');
      try {
        // 1. Init
        const initResp = await api('/files/upload-init', {
          method: 'POST',
          body: JSON.stringify({ name: file.name, size: file.size, type: file.type, path: currentPath }),
        });
        const initData = await initResp.json();
        if (!initResp.ok) throw new Error(initData.error || initData.message || '上传初始化失败');

        // If server suggests direct upload or file is small, use direct upload
        const DIRECT_LIMIT = 4 * 1024 * 1024; // 4 MB
        if (initData.directUpload || file.size <= DIRECT_LIMIT) {
          // Use direct upload (more reliable, no CORS/presigned URL issues)
          status.textContent = '上传中...';
          fill.style.width = '50%';
          const params = new URLSearchParams({ name: file.name, path: currentPath, type: file.type || 'application/octet-stream' });
          const directResp = await api('/files/upload-direct?' + params.toString(), {
            method: 'POST',
            body: file,
          });
          const directData = await directResp.json();
          if (!directResp.ok) throw new Error(directData.error || directData.message || '上传失败');
          fill.style.width = '100%';
          fill.classList.add('done');
          status.textContent = '上传成功';
          status.className = 'upload-status success';
          return;
        }

        // 2. Upload to blob via presigned URL (XHR for progress)
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('PUT', initData.uploadUrl);
          xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const pct = Math.round((e.loaded / e.total) * 100);
              fill.style.width = pct + '%';
              status.textContent = pct + '%';
            }
          };
          xhr.onload = () => (xhr.status >= 200 && xhr.status < 300 ? resolve() : reject(new Error('上传失败 (' + xhr.status + ')')));
          xhr.onerror = () => reject(new Error('网络错误，尝试直传...'));
          xhr.ontimeout = () => reject(new Error('上传超时'));
          xhr.timeout = 120000; // 2 min
          xhr.send(file);
        });

        // 3. Complete
        fill.style.width = '100%';
        status.textContent = '完成中...';
        const compResp = await api('/files/upload-complete', {
          method: 'POST',
          body: JSON.stringify({ fileId: initData.fileId, name: file.name, size: file.size, type: file.type, path: currentPath }),
        });
        const compData = await compResp.json();
        if (!compResp.ok) throw new Error(compData.error || compData.message || '上传完成失败');

        fill.classList.add('done');
        status.textContent = '上传成功';
        status.className = 'upload-status success';
      } catch (err) {
        // Fallback: try direct upload if presigned URL failed and file is small enough
        if (file.size <= 4 * 1024 * 1024 && !err._directFailed) {
          try {
            status.textContent = '重试中（直传模式）...';
            fill.style.width = '30%';
            fill.classList.remove('error');
            const params = new URLSearchParams({ name: file.name, path: currentPath, type: file.type || 'application/octet-stream' });
            const directResp = await api('/files/upload-direct?' + params.toString(), {
              method: 'POST',
              body: file,
            });
            const directData = await directResp.json();
            if (!directResp.ok) throw new Error(directData.error || directData.message || '直传失败');
            fill.style.width = '100%';
            fill.classList.add('done');
            fill.classList.remove('error');
            status.textContent = '上传成功';
            status.className = 'upload-status success';
            return;
          } catch (retryErr) {
            retryErr._directFailed = true;
            fill.classList.add('error');
            status.textContent = retryErr.message;
            status.className = 'upload-status error';
            return;
          }
        }
        fill.classList.add('error');
        status.textContent = err.message;
        status.className = 'upload-status error';
      }
    }

    // ═══ Move ═══

    async function loadMoveFolders() {
      const file = items.find(f => f.id === moveTargetId);
      const fileFullPath = file ? (file.path + file.name + '/') : '';
      try {
        const resp = await api('/files?path=' + encodeURIComponent(moveCurrentPath));
        if (!resp.ok) { showToast('加载文件夹失败', 'error'); return; }
        const data = await resp.json();
        moveFolders = (data.items || []).filter(f => f.isFolder);
        renderMoveModal(file, fileFullPath);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderMoveModal(file, fileFullPath) {
      // Breadcrumbs for destination
      const parts = moveCurrentPath.split('/').filter(Boolean);
      let crumbsHtml = '<span class="move-crumb" onclick="moveNavigateTo(\'/\')">根目录</span>';
      let p = '';
      for (let i = 0; i < parts.length; i++) {
        p += '/' + parts[i];
        crumbsHtml += '<span class="move-crumb-sep">/</span>';
        crumbsHtml += '<span class="move-crumb" onclick="moveNavigateTo(\'' + escapeAttr(p + '/') + '\')">' + escapeHtml(parts[i]) + '</span>';
      }
      // Folder list
      let listHtml = '';
      if (moveFolders.length === 0) {
        listHtml = '<div class="move-empty">此处没有子文件夹</div>';
      } else {
        for (const f of moveFolders) {
          const fp = f.path + f.name + '/';
          // Prevent moving a folder into itself or its descendant
          const isDisabled = fileFullPath && file && file.isFolder && (fp === fileFullPath || fp.startsWith(fileFullPath));
          listHtml += '<div class="move-folder-item' + (isDisabled ? ' disabled' : '') + '" ' + (isDisabled ? '' : 'onclick="moveNavigateTo(\'' + escapeAttr(fp) + '\')"') + '>'
            + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'
            + '<span>' + escapeHtml(f.name) + '</span>'
            + (isDisabled ? '<span class="move-hint">（原位置）</span>' : '<svg class="move-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>')
            + '</div>';
        }
      }
      // Can't move into current parent (no-op)
      const currentParent = file ? file.path : '';
      const isSame = moveCurrentPath === currentParent;
      showModal(`
        <div class="modal-header">
          <span class="modal-title">移动 “${escapeAttr(file ? file.name : '')}”</span>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="move-breadcrumbs">${crumbsHtml}</div>
          <div class="move-folder-list">${listHtml}</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="confirmMove()" ${isSame ? 'disabled title="与当前位置相同"' : ''}>移动到此处</button>
        </div>`);
    }

    async function moveNavigateTo(path) {

    // ═══ Modal helpers ═══
    function showModal(html) {
      const modal = document.getElementById('modalContent');
      // Clean up previous preview URL
      if (modal._previewUrl) { URL.revokeObjectURL(modal._previewUrl); modal._previewUrl = null; }
      modal.innerHTML = html;
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      const modal = document.getElementById('modalContent');
      if (modal._previewUrl) { URL.revokeObjectURL(modal._previewUrl); modal._previewUrl = null; }
      document.getElementById('modalOverlay').classList.remove('show');
    }

    function closeModalOnOverlay(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function (e) {
      const tag = (e.target.tagName || '').toLowerCase();
      const typing = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;
      const modalOpen = document.getElementById('modalOverlay').classList.contains('show');
      if (e.key === 'Escape') {
        if (modalOpen) closeModal();
        else if (selectMode) exitSelectMode();
        return;
      }
      if (typing || modalOpen) return;
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
        if (selectMode) { e.preventDefault(); selectAll(); }
      } else if (e.key === '/' && !selectMode) {
        e.preventDefault();
        const si = document.getElementById('searchInput');
        if (si) si.focus();
      }
    });

        dragCounter++;
        document.getElementById('dropOverlay').classList.add('show');
      }

        dragCounter = 0;
        document.getElementById('dropOverlay').classList.remove('show');
      }

      e.preventDefault();
      dragCounter = 0;
      document.getElementById('dropOverlay').classList.remove('show');
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        uploadFiles(Array.from(e.dataTransfer.files));

    }

    // ═══ File icons ═══
    function getFileIcon(file, size) {
      size = size || 48;
      if (file.isFolder) {
        return `<svg class="file-icon" width="${size}" height="${size}" viewBox="0 0 24 24" fill="#2563eb"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`;
      }
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      const type = file.type || '';
      let color = '#6b7280';
      let path = '<path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/><path d="M14 2v6h6" fill="none" stroke="white" stroke-width="1.5"/>';

      if (isImageType(type, ext)) { color = '#8b5cf6'; }
      else if (isVideoType(type, ext)) { color = '#ec4899'; }
      else if (isAudioType(type, ext)) { color = '#f59e0b'; }
      else if (ext === 'pdf') { color = '#dc2626'; }
      else if (['doc', 'docx'].includes(ext)) { color = '#2563eb'; }
      else if (['xls', 'xlsx'].includes(ext)) { color = '#16a34a'; }
      else if (['ppt', 'pptx'].includes(ext)) { color = '#ea580c'; }
      else if (['zip', 'rar', '7z', 'gz', 'tar'].includes(ext)) { color = '#7c3aed'; }
      else if (['js', 'ts', 'py', 'java', 'c', 'cpp', 'go', 'rs', 'rb', 'php', 'html', 'css', 'json', 'xml', 'sh'].includes(ext)) { color = '#0891b2'; }
      else if (isTextType(type, ext)) { color = '#6b7280'; }

      return `<svg class="file-icon" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}">${path}</svg>`;
    }

    function isImageFile(file) {
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      return isImageType(file.type || '', ext);
    }
    function isTextFile(file) {
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      return isTextType(file.type || '', ext) && (file.size || 0) < 2 * 1024 * 1024;
    }
    function isImageType(type, ext) {
      return type.startsWith('image/') || ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'ico'].includes(ext);
    }
    function isVideoType(type, ext) {
      return type.startsWith('video/') || ['mp4', 'webm', 'avi', 'mov', 'mkv', 'flv'].includes(ext);
    }
    function isAudioType(type, ext) {
      return type.startsWith('audio/') || ['mp3', 'wav', 'flac', 'aac', 'ogg', 'm4a'].includes(ext);
    }
    function isTextType(type, ext) {
      return type.startsWith('text/') || ['txt', 'md', 'log', 'js', 'ts', 'py', 'java', 'c', 'cpp', 'go', 'rs', 'rb', 'php', 'html', 'css', 'json', 'xml', 'sh', 'yml', 'yaml', 'toml', 'ini', 'conf'].includes(ext);
    }

    // ═══ Utils ═══
    function formatBytes(bytes) {
      if (!bytes || bytes <= 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.min(Math.floor(Math.log(bytes) / Math.log(k)), sizes.length - 1);
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${day} ${h}:${min}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
    function escapeAttr(str) {
      return (str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ═══ Admin ═══
    async function showAdminView() {
      document.getElementById('driveView').classList.remove('show');
      document.getElementById('adminView').classList.add('show');
      await Promise.all([loadAdminStats(), loadAdminUsers(), loadAdminConfig()]);
    }

    function hideAdminView() {
      document.getElementById('adminView').classList.remove('show');
      document.getElementById('driveView').classList.add('show');
    }

    async function loadAdminStats() {
      try {
        const resp = await api('/admin/stats');
        if (!resp.ok) return;
        const data = await resp.json();
        document.getElementById('adminUserCount').textContent = data.userCount || 0;
        document.getElementById('adminTotalStorage').textContent = formatBytes(data.totalStorage || 0);
        document.getElementById('adminTotalFiles').textContent = data.totalFiles || 0;
        document.getElementById('adminAdminCount').textContent = data.adminCount || 0;
      } catch (err) {
        showToast('加载统计失败: ' + err.message, 'error');
      }
    }

    async function loadAdminUsers() {
      const tbody = document.getElementById('adminUserTableBody');
      try {
        const resp = await api('/admin/users');
        if (!resp.ok) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--danger);">加载失败</td></tr>'; return; }
        const data = await resp.json();
        const users = data.users || [];
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--mute);padding:24px;">暂无用户</td></tr>';
          return;
        }
        tbody.innerHTML = users.map(u => `
          <tr>
            <td style="font-weight:500;">${escapeHtml(u.username)}</td>
            <td><span class="admin-badge ${u.isAdmin ? 'admin' : ''}">${u.isAdmin ? '管理员' : '用户'}</span></td>
            <td>${formatBytes(u.storageUsed || 0)}</td>
            <td>${u.fileCount || 0}</td>
            <td style="font-size:12px;color:var(--body);">${formatDate(u.createdAt)}</td>
            <td>${u.isAdmin ? '<span style="color:var(--mute);font-size:12px;">—</span>' : `<button class="btn btn-danger" style="padding:4px 10px;font-size:12px;" onclick="deleteAdminUser('${u.id}','${escapeAttr(u.username)}')">删除</button>`}</td>
          </tr>`).join('');
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--danger);">加载失败: ' + escapeHtml(err.message) + '</td></tr>';
      }
    }

    async function deleteAdminUser(userId, username) {
      if (!confirm(`确认删除用户 "${username}"？\n该用户的所有文件和数据将被永久删除。`)) return;
      try {
        const resp = await api('/admin/users?userId=' + encodeURIComponent(userId), { method: 'DELETE' });
        if (!resp.ok) { const d = await resp.json(); throw new Error(d.error || '删除失败'); }
        showToast('用户已删除', 'success');
        await Promise.all([loadAdminStats(), loadAdminUsers()]);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function loadAdminConfig() {
      try {
        const resp = await api('/admin/config');
        if (!resp.ok) return;
        const data = await resp.json();
        const cfg = data.config;
        document.getElementById('cfgMaxFileSize').value = Math.round((cfg.maxFileSize || 50 * 1024 * 1024) / (1024 * 1024));
        document.getElementById('cfgUserQuota').value = Math.round((cfg.userQuota || 500 * 1024 * 1024) / (1024 * 1024));
        document.getElementById('cfgAllowRegistration').value = cfg.allowRegistration !== false ? 'true' : 'false';
      } catch (err) {
        showToast('加载配置失败: ' + err.message, 'error');
      }
    }

    async function saveAdminConfig() {
      const maxFileSize = parseInt(document.getElementById('cfgMaxFileSize').value) * 1024 * 1024;
      const userQuota = parseInt(document.getElementById('cfgUserQuota').value) * 1024 * 1024;
      const allowRegistration = document.getElementById('cfgAllowRegistration').value === 'true';
      try {
        const resp = await api('/admin/config', {
          method: 'PATCH',
          body: JSON.stringify({ maxFileSize, userQuota, allowRegistration }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || '保存失败');
        showToast('配置已保存', 'success');
        await loadAdminStats();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // ═══ Init ═══
    (async function init() {
      updateViewIcon();
      if (token) {
        const ok = await checkAuth();
        if (ok) {
          await enterDrive();
        } else {
          handleLogout();
        }
      }
      // Remove loading state — show the appropriate view
      document.documentElement.classList.remove('app-loading');
    })();
  </script>
</body>
